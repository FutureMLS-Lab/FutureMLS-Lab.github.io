<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-label="RUD: Repeat Until Done loop">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1c3a63"/>
    </marker>
    <style>
      .t  { font-family: "Source Serif 4", Georgia, serif; }
      .s  { font-family: "Inter", system-ui, sans-serif; }
      .bt { font-family: "Inter", system-ui, sans-serif; font-weight: 600; fill: #13294b; }
      .bs { font-family: "Inter", system-ui, sans-serif; fill: #6a7280; }
      .lbl{ font-family: "Inter", system-ui, sans-serif; fill: #6a7280; }
    </style>
  </defs>

  <rect width="1000" height="600" fill="#f5f7fb"/>

  <!-- title -->
  <text x="72" y="80" class="t" font-size="40" font-weight="700" fill="#13294b">RUD</text>
  <text x="74" y="108" class="s" font-size="17" fill="#6a7280">Repeat Until Done</text>

  <!-- Done pill -->
  <rect x="416" y="92" width="168" height="60" rx="30" fill="#13294b"/>
  <text x="500" y="129" text-anchor="middle" class="s" font-size="21" font-weight="600" fill="#ffffff">Done &#10003;</text>

  <!-- stage boxes -->
  <rect x="70"  y="250" width="190" height="92" rx="14" fill="#ffffff" stroke="#cdd5e1" stroke-width="1.5"/>
  <text x="165" y="292" text-anchor="middle" class="bt" font-size="22">Run</text>
  <text x="165" y="316" text-anchor="middle" class="bs" font-size="13.5">train &#183; generate</text>

  <rect x="405" y="250" width="190" height="92" rx="14" fill="#ffffff" stroke="#cdd5e1" stroke-width="1.5"/>
  <text x="500" y="292" text-anchor="middle" class="bt" font-size="22">Evaluate</text>
  <text x="500" y="316" text-anchor="middle" class="bs" font-size="13.5">score &#183; verify</text>

  <rect x="740" y="250" width="190" height="92" rx="14" fill="#ffffff" stroke="#cdd5e1" stroke-width="1.5"/>
  <text x="835" y="292" text-anchor="middle" class="bt" font-size="22">Refine</text>
  <text x="835" y="316" text-anchor="middle" class="bs" font-size="13.5">adjust &#183; retry</text>

  <!-- arrows -->
  <line x1="262" y1="296" x2="398" y2="296" stroke="#1c3a63" stroke-width="2.4" marker-end="url(#ah)"/>
  <line x1="500" y1="248" x2="500" y2="155" stroke="#1c3a63" stroke-width="2.4" marker-end="url(#ah)"/>
  <line x1="597" y1="296" x2="738" y2="296" stroke="#1c3a63" stroke-width="2.4" marker-end="url(#ah)"/>

  <!-- labels on branches -->
  <text x="516" y="205" class="lbl" font-size="14.5" fill="#15803d">passes</text>
  <text x="667" y="282" text-anchor="middle" class="lbl" font-size="14.5">not done</text>

  <!-- loop back: Refine -> Run -->
  <path d="M 835 344 V 446 Q 835 470 811 470 H 189 Q 165 470 165 446 V 344"
        fill="none" stroke="#1c3a63" stroke-width="2.4" marker-end="url(#ah)"/>
  <text x="500" y="456" text-anchor="middle" class="lbl" font-size="15.5">refine &amp; repeat</text>
</svg>
